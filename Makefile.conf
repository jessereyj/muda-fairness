# This configuration file was generated by running:
#   rocq makefile -f _CoqProject -o Makefile.conf

COQBIN ?=
ifneq (,$(COQBIN))
COQBIN := $(COQBIN)/
endif

# Use Rocq’s makefile shim for all queries
COQMKFILE ?= "$(COQBIN)rocq" makefile

###############################################################################
# Project files (discovered via Rocq).
###############################################################################

COQMF_CMDLINE_VFILES :=
COQMF_SOURCES := $(shell $(COQMKFILE) -sources-of -f _CoqProject $(COQMF_CMDLINE_VFILES))
COQMF_VFILES := $(filter %.v,      $(COQMF_SOURCES))
COQMF_MLIFILES := $(filter %.mli,  $(COQMF_SOURCES))
COQMF_MLFILES  := $(filter %.ml,   $(COQMF_SOURCES))
COQMF_MLGFILES := $(filter %.mlg,  $(COQMF_SOURCES))
COQMF_MLPACKFILES := $(filter %.mlpack, $(COQMF_SOURCES))
COQMF_MLLIBFILES  := $(filter %.mllib,  $(COQMF_SOURCES))
COQMF_METAFILE :=

###############################################################################
# Logical paths (-I, -R, -Q).
###############################################################################

COQMF_OCAMLLIBS :=
COQMF_SRC_SUBDIRS :=
COQMF_COQLIBS       := -R LTL MUDA.LTL -R MUDA MUDA.MUDA -R Fairness MUDA.Fairness
COQMF_COQLIBS_NOML  := -R LTL MUDA.LTL -R MUDA MUDA.MUDA -R Fairness MUDA.Fairness
COQMF_CMDLINE_COQLIBS :=

###############################################################################
# Rocq configuration (derived dynamically, no hard-coded OPAM paths).
###############################################################################

# Root of Rocq libraries, e.g., .../lib/rocq
COQMF_COQROOT     := $(shell "$(COQBIN)rocq" c -where 2>/dev/null)
# Coq-compatible lib root (for legacy vars). Many make rules expect these.
# Map sensibly for Rocq:
COQMF_COQLIB      := $(COQMF_COQROOT)
COQMF_COQCORELIB  := $(COQMF_COQROOT)/../rocq-runtime
COQMF_DOCDIR      := $(shell dirname "$(COQMF_COQROOT)")/share/doc
COQMF_OCAMLFIND   := $(shell command -v ocamlfind 2>/dev/null || echo ocamlfind)

# Reasonable defaults (Rocq ships these; adjust if you have stricter policies)
COQMF_CAMLFLAGS   := -thread -bin-annot -strict-sequence
COQMF_WARN        := -warn-error +a-3
COQMF_HASNATDYNLINK := true

# Source subdirs list is rarely needed with Rocq; leave empty by default.
COQMF_COQ_SRC_SUBDIRS :=

# Rocq default: native compiler off unless explicitly requested
COQMF_COQ_NATIVE_COMPILER_DEFAULT := no
COQMF_WINDRIVE :=

###############################################################################
# Native compiler flag from _CoqProject (leave empty unless you set it there).
###############################################################################

COQMF_COQPROJECTNATIVEFLAG :=

###############################################################################
# Extra variables.
###############################################################################

# Keep your warning suppressions
COQMF_OTHERFLAGS := '-w' '-notation-overridden' '-w' '-redundant-canonical-projection'
COQMF_INSTALLCOQDOCROOT := MUDA
